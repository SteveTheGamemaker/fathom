{% if results %}
<div style="max-height: 300px; overflow-y: auto;">
    {% for m in results %}
    <div class="result-row" style="cursor:pointer;"
         onclick="selectMovie({{ m.id }}, '{{ m.title | e }}', {{ m.year }}, '{{ (m.overview or '') | e }}', '{{ m.poster_url or '' }}', '{{ m.imdb_id or '' }}')">
        <div style="width:40px;height:60px;background:#111;border-radius:4px;overflow:hidden;flex-shrink:0;">
            {% if m.poster_url %}
            <img src="{{ m.poster_url }}" style="width:100%;height:100%;object-fit:cover;">
            {% endif %}
        </div>
        <div class="result-title">
            <div class="name">{{ m.title }}</div>
            <div class="meta">{{ m.year }} {% if m.overview %}&middot; {{ m.overview[:100] }}{% if m.overview|length > 100 %}...{% endif %}{% endif %}</div>
        </div>
    </div>
    {% endfor %}
</div>
{% elif query %}
<div class="text-muted text-sm" style="padding: 12px;">No results for "{{ query }}"</div>
{% endif %}
