{% if results %}
<div style="max-height: 300px; overflow-y: auto;">
    {% for s in results %}
    <div class="result-row" style="cursor:pointer;"
         onclick="selectSeries({{ s.tvdb_id or 0 }}, {{ s.tmdb_id }}, '{{ s.title | e }}', {{ s.year }}, '{{ (s.overview or '') | e }}', '{{ s.poster_url or '' }}')">
        <div style="width:40px;height:60px;background:#111;border-radius:4px;overflow:hidden;flex-shrink:0;">
            {% if s.poster_url %}
            <img src="{{ s.poster_url }}" style="width:100%;height:100%;object-fit:cover;">
            {% endif %}
        </div>
        <div class="result-title">
            <div class="name">{{ s.title }}</div>
            <div class="meta">{{ s.year }} {% if s.overview %}&middot; {{ s.overview[:100] }}{% if s.overview|length > 100 %}...{% endif %}{% endif %}</div>
        </div>
    </div>
    {% endfor %}
</div>
{% elif query %}
<div class="text-muted text-sm" style="padding: 12px;">No results for "{{ query }}"</div>
{% endif %}
